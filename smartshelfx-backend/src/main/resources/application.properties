# H2 Configuration for Render
spring.datasource.url=jdbc:h2:mem:smartshelfxdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 console for testing (optional, secure it in prod)
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Environment variable pointing to your Python AI service URL
ai.service.url=${AI_SERVICE_URL}

server.port=8080



application.security.jwt.secret-key=498A0F2B4D6E3F5A8C7B9E2D1F0A6B5C3E7D9F1B2A3C4D5E6F7A8B9C0D1E2F3A


application.security.jwt.expiration=86400000


spring.jpa.hibernate.ddl-auto=update


spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl