<div class="auth-card">
  <h2>SmartShelfX Registration</h2>
  <form [formGroup]="registerForm" (ngSubmit)="onRegisterSubmit()">

    <div class="form-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" formControlName="name">
      <div class="error-message" *ngIf="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">
        Name is required.
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" formControlName="email">
      <div class="error-message" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
        <span *ngIf="registerForm.get('email')?.errors?.['required']">Email is required.</span>
        <span *ngIf="registerForm.get('email')?.errors?.['email']">Must be a valid email format.</span>
      </div>
    </div>

    <div class="form-group">
      <label for="role">Account Type</label>
      <select id="role" formControlName="role">
        <option value="" disabled selected>Select your role</option>
        <option value="ADMIN">Admin</option>
        <option value="MANAGER">Manager</option>
        <option value="VENDOR">Vendor</option>
      </select>
      <div class="error-message" *ngIf="registerForm.get('role')?.invalid && registerForm.get('role')?.touched">
        Please select a role.
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" formControlName="password">
      <div class="error-message" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
        <span *ngIf="registerForm.get('password')?.errors?.['required']">Password is required.</span>
        <span *ngIf="registerForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters.</span>
      </div>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirm Password</label>
      <input type="password" id="confirmPassword" formControlName="confirmPassword">
      <div class="error-message" *ngIf="registerForm.get('confirmPassword')?.invalid && registerForm.get('confirmPassword')?.touched">
        Password confirmation is required.
      </div>
    </div>

    <div *ngIf="registerForm.errors?.['mismatch'] && registerForm.get('confirmPassword')?.touched" class="error-message" style="text-align: center;">
      Passwords do not match.
    </div>

    <button type="submit" [disabled]="!registerForm.valid">
      Create Account
    </button>

  </form>

  <p class="switch-link">
    Already have an account? <a [routerLink]="['/login']">Sign In</a>
  </p>
</div>
